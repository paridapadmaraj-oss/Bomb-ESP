<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💬 WhatsApp Bomber - 1 Script</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(0,0,0,0.9);
            border: 3px solid #25D366;
            border-radius: 25px;
            padding: 3rem;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 75px rgba(37,211,102,0.4);
            text-align: center;
        }
        .whatsapp-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 20px #25D366);
        }
        h1 { 
            font-size: 2.5rem; 
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #25D366, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .number-input {
            width: 100%;
            padding: 1.5rem;
            font-size: 1.5rem;
            border: 3px solid #25D366;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            color: white;
            text-align: center;
            margin: 2rem 0;
            font-weight: bold;
        }
        .number-input::placeholder { color: rgba(255,255,255,0.7); }
        .number-input:focus {
            outline: none;
            box-shadow: 0 0 30px rgba(37,211,102,0.6);
            border-color: #00ff88;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 2rem 0;
        }
        .btn {
            padding: 1.2rem 2rem;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        .btn-start {
            background: linear-gradient(45deg, #25D366, #00ff88);
            color: white;
            box-shadow: 0 10px 30px rgba(37,211,102,0.5);
        }
        .btn-start:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(37,211,102,0.7);
        }
        .btn-stop {
            background: linear-gradient(45deg, #ff4444, #ff6666);
            color: white;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 2rem 0;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .stat {
            background: rgba(255,255,255,0.1);
            padding: 1rem 1.5rem;
            border-radius: 15px;
            border: 2px solid rgba(37,211,102,0.3);
        }
        .stat-number { font-size: 2rem; font-weight: bold; color: #00ff88; display: block; }
        .log {
            background: rgba(0,0,0,0.7);
            border: 2px solid #25D366;
            border-radius: 15px;
            padding: 1.5rem;
            height: 250px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 1rem;
            text-align: left;
            margin-top: 2rem;
            white-space: pre-wrap;
        }
        .message-display {
            background: rgba(37,211,102,0.2);
            padding: 1rem;
            border-radius: 12px;
            margin: 1rem 0;
            font-family: monospace;
            font-size: 1.1rem;
            border-left: 5px solid #25D366;
        }
        @media (max-width: 480px) {
            .container { padding: 2rem 1.5rem; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="whatsapp-icon">💬</div>
        <h1>WhatsApp Bomber</h1>
        <p style="opacity: 0.9; margin-bottom: 2rem;">Enter number → Spam unlimited messages!</p>
        
        <input type="tel" class="number-input" id="whatsappNumber" 
               placeholder="91xxxxxxxxxx (without +)" maxlength="12">
        
        <div class="message-display" id="currentMessage">
            Message: "Your free gift expires in 1 hour! Claim now: whatsapp.com/gift"
        </div>

        <div class="controls">
            <button class="btn btn-start" onclick="startWhatsAppBomb()">🚀 START SPAM</button>
            <button class="btn btn-stop" onclick="stopWhatsAppBomb()">⏹️ STOP</button>
            <input type="number" id="messageCount" placeholder="Messages (500)" min="1" max="9999" 
                   style="padding:1.2rem; font-size:1.2rem; border:2px solid #25D366; border-radius:15px; background:rgba(255,255,255,0.1); color:white; text-align:center;">
        </div>

        <div class="stats">
            <div class="stat">
                <span class="stat-number" id="messagesSent">0</span>
                Messages Sent
            </div>
            <div class="stat">
                <span class="stat-number" id="targetDisplay">-</span>
                Target Number
            </div>
            <div class="stat">
                <span class="stat-number" id="speed">0</span>
                msg/sec
            </div>
        </div>

        <div class="log" id="bombLog">
[SYSTEM] WhatsApp Bomber Ready
[SYSTEM] Enter Indian number (91xxxxxxxxxx)
[SYSTEM] Click START SPAM → Unlimited messages!
        </div>
    </div>

    <script>
        let bombing = false;
        let bombInterval;
        let messagesSent = 0;
        let targetNumber = '';
        let totalMessages = 500;

        const whatsappMessages = [
            "🔥 FREE GIFT EXPIRES IN 1HR! Claim: wa.me/91yourlink",
            "✅ Your OTP: 748392",
            "💰 UPI Payment Rs.500 received",
            "📦 Delivery delayed - reschedule?",
            "🎉 Win iPhone 15! Reply YES",
            "⚠️ Account login from new device",
            "🏆 Daily reward: 500 coins FREE",
            "💳 Card ending ****1234 updated",
            "🚨 Low battery warning (15%)",
            "📱 WhatsApp update required",
            "🎊 Congrats! You won Rs.5000",
            "🔒 Security alert - verify now",
            "📈 Stock alert: BUY NOW +200%",
            "🍕 Free pizza coupon expires today",
            "✈️ Flight delayed 2hrs - claim refund"
        ];

        function log(msg) {
            const logEl = document.getElementById('bombLog');
            const time = new Date().toLocaleTimeString();
            logEl.textContent += `\n[${time}] 💬 ${msg}`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        function updateStats() {
            document.getElementById('messagesSent').textContent = messagesSent;
            document.getElementById('targetDisplay').textContent = targetNumber || '-';
            document.getElementById('speed').textContent = bombing ? '2-5' : '0';
        }

        function getRandomWhatsAppMessage() {
            return whatsappMessages[Math.floor(Math.random() * whatsappMessages.length)];
        }

        function startWhatsAppBomb() {
            targetNumber = document.getElementById('whatsappNumber').value.trim();
            totalMessages = parseInt(document.getElementById('messageCount').value) || 500;

            if (!targetNumber || targetNumber.length < 10) {
                alert('❌ Enter valid WhatsApp number (91xxxxxxxxxx)');
                return;
            }

            if (bombing) return;

            bombing = true;
            messagesSent = 0;
            log(`🚀 WHATSAPP BOMB STARTED → ${targetNumber}`);
            log(`📊 Target: ${totalMessages} messages`);

            bombInterval = setInterval(() => {
                if (bombing && messagesSent < totalMessages) {
                    const message = getRandomWhatsAppMessage();
                    messagesSent++;
                    
                    // Update current message display
                    document.getElementById('currentMessage').textContent = `Message #${messagesSent}: "${message}"`;
                    
                    log(`📨 #${messagesSent}/${totalMessages} → "${message.substring(0,30)}..."`);
                    
                    // SIMULATED WhatsApp Web API
                    simulateWhatsAppSend(targetNumber, message);
                    
                    updateStats();
                } else {
                    stopWhatsAppBomb();
                }
            }, 1200); // 1.2 seconds per message
        }

        function stopWhatsAppBomb() {
            bombing = false;
            if (bombInterval) clearInterval(bombInterval);
            log(`⏹️ BOMB STOPPED | ${messagesSent}/${totalMessages} messages sent`);
            updateStats();
        }

        // SIMULATE WhatsApp Web API (Production: use WhatsApp Web automation)
        function simulateWhatsAppSend(number, message) {
            // Mock API call - Replace with real WhatsApp automation
            fetch('https://api.whatsapp.com/send', {
                method: 'POST',
                body: JSON.stringify({phone: number, text: message})
            }).catch(() => {
                console.log(`💬 SIMULATED → ${number}: ${message}`);
            });
        }

        // Enter key start
        document.getElementById('whatsappNumber').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startWhatsAppBomb();
        });

        updateStats();
    </script>
</body>
</html>
